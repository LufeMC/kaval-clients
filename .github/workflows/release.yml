name: Release

# Publishes the open-source clients on a version tag (e.g. `git tag v0.1.0 && git push --tags`), or
# manually via the Actions tab: the npm SDK (`@usekaval/kaval`), the MCP server (`@usekaval/mcp`), and the PyPI SDK
# (`kaval`). All three are thin clients for the hosted Kaval API.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm:
    name: Publish Node SDK (@usekaval/kaval) to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build + test the Node SDK
        run: pnpm --filter @usekaval/kaval run build && pnpm --filter @usekaval/kaval run test
      - name: Assert git tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: sdks/node
        run: test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"
      - name: Publish to npm
        working-directory: sdks/node
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  mcp:
    name: Publish MCP server (@usekaval/mcp) to npm
    needs: [npm]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # @usekaval/mcp depends on the `@usekaval/kaval` workspace package — build it first (topological), then test.
      - name: Build + test the MCP server
        run: pnpm --filter "@usekaval/mcp..." run build && pnpm --filter @usekaval/mcp run test
      - name: Assert git tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: packages/mcp
        run: test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"
      # pnpm publish (not npm) rewrites the `@usekaval/kaval` workspace:^ dependency to a real semver range.
      - name: Publish to npm
        working-directory: packages/mcp
        run: pnpm publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi:
    name: Publish Python SDK (kaval) to PyPI
    runs-on: ubuntu-latest
    # Uses PyPI Trusted Publishing (OIDC) — configure a trusted publisher for `kaval` on PyPI first,
    # pointing at this repo + workflow. No PYPI_TOKEN secret needed. (Set up an environment named `pypi`.)
    environment: pypi
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test and package tooling
        run: |
          python -m pip install --upgrade pip
          pip install \
            "build==1.5.0" \
            "pydantic-ai==2.13.0" \
            "pyright==1.1.411" \
            "twine==6.2.0" \
            -e ".[dev,pydantic-ai]"
      - name: Test and typecheck
        run: |
          pytest
          pyright --warnings
      - name: Assert git tag matches pyproject.toml version
        if: startsWith(github.ref, 'refs/tags/')
        run: test "v$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" = "$GITHUB_REF_NAME"
      - name: Build and inspect publish artifacts
        run: |
          python -c 'from pathlib import Path; p = Path("uv.lock"); assert not p.exists(), "uv.lock must remain untracked"; p.write_text("release exclusion sentinel\n", encoding="utf-8")'
          python -m build
          python -m twine check dist/*
          python scripts/check_dist.py dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist/

  mcp_registry:
    name: Publish MCP metadata to the official registry
    needs: [mcp]
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-mcp-registry.yml
