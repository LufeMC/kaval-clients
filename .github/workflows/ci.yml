name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js:
    name: JS clients (build · lint · typecheck · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Release workflow (v* tag → npm + mcp + pypi)
        run: node scripts/check-release-workflow.mjs
      # `check` builds first (@usekaval/kaval before @usekaval/mcp, topological) so the MCP typecheck/test resolve
      # the `@usekaval/kaval` types/runtime, then lints, typechecks, and tests.
      - name: Build, lint, typecheck, test
        run: pnpm run check

  node18:
    name: Node SDK (Node 18 compatibility)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build + test + ESM smoke
        run: |
          pnpm --filter @usekaval/kaval run build
          pnpm --filter @usekaval/kaval run test
          node sdks/node/test/node18-smoke.mjs

  python:
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install \
            "build==1.5.0" \
            "pydantic-ai==2.13.0" \
            "pyright==1.1.411" \
            "twine==6.2.0" \
            -e ".[dev,pydantic-ai]"
      - name: Test and typecheck
        run: |
          pytest
          pyright --warnings
      - name: Build and inspect publish artifacts
        run: |
          python -c 'from pathlib import Path; p = Path("uv.lock"); assert not p.exists(), "uv.lock must remain untracked"; p.write_text("CI exclusion sentinel\n", encoding="utf-8")'
          python -m build
          python -m twine check dist/*
          python scripts/check_dist.py dist
