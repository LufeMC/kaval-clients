name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js:
    name: JS clients (build · lint · typecheck · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Release workflow (v* tag → npm + mcp + pypi)
        run: node scripts/check-release-workflow.mjs
      # `check` builds first (kaval before @kaval/mcp, topological) so the MCP typecheck/test resolve
      # the `kaval` types/runtime, then lints, typechecks, and tests.
      - name: Build, lint, typecheck, test
        run: pnpm run check

  python:
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test (hermetic contract tests)
        run: pytest
